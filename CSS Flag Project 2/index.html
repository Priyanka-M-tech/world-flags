<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./flagproject.html">

    <style>
        .flag {
            background-color: rgb(0, 153, 255);
            height: 200px;
            width: 300px;
            position: relative;
        }
        .flag > div {
            background-color: #FFFF00;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            top: 50px;
            left: 35px;
            position: absolute;
        }
        p {
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>
    
    <div class="flag">
        <div>
            <p>The flag <br> of <br> palau</p>
        </div>
    </div>
    <h2>Frontend code of Palau:</h2>
    <img src="./palaucode.png" alt="" style="width: 500px;" height="400px">
    
</body>
</html>

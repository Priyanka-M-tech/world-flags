<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./flagproject.html">

    <style>
        .flag {
            background-color: #006a4e;
            height: 200px;
            width: 300px;
            position: relative;
        }
        .flag > div {
            background-color: #f42a41;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            top: 50px;
            left: 35px;
            position: absolute;
        }
        p {
            text-align: center;
            font-size: 15px;
            color: white;
        }
    </style>
</head>
<body>
    
    <div class="flag">
        <div>
            <p>The flag <br> of <br> Bangladesh</p>
        </div>
    </div>
    <h2>Frontend code of Bangladesh:</h2>
    <img src="./bangladeshcode.png" alt="" height="450px" width="400px">
</body>
</html>

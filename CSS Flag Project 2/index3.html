<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    .flag {
      background-color:#CE1126 ;
      height: 600px;
      width: 900px;
      text-align: center;
      color: white;
      position: relative;

    }
    .flag > div  {
      
      background-color:#002868 ;
      height: 300px;
      width: 100%;
      position: absolute;
      top: 150px;
      
    }
    .flag > div > div {
      background-color: white;
      position: absolute;
      
      height: 200px;
      width: 200px;
      border-radius: 50%;
      top: 50px;
      left: 350px;
    }
    p {
      font-size: 5rem;
      color: white;
      text-align: center;
      padding: 0;
      margin: 0;
    }
    .flag>div div p {
      color: black;
    }
  </style>
</head>
<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p >of Laos</p>
      </div>
    </div>
  </div>
  <h2>Frontend code of Laos:</h2>
  <img src="./laoscode1.png" alt="" style="width: 300px;">
  <img src="./laoscode2.png" alt="" style="width: 300px;">

</body>

</html>
